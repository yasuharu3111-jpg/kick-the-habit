<style>
:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface2: #f5f5f5;
  --border: #e0e0e0;
  --border2: #c0c0c0;
  --text: #0a0a0a;
  --text2: #555555;
  --muted: #999999;
  --ok: #1a5fa0;
  --ok-bg: #1a5fa0;
  --ok-light: #e8f2fb;
  --fail: #c0392b;
  --fail-bg: #c0392b;
  --fail-light: #fbeaea;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 3rem 2rem 6rem;
}

/* ── HEADER ── */
header {
  margin-bottom: 3rem;
  animation: fadeUp 0.5s ease both;
}

.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: clamp(3.8rem, 16vw, 7rem);
  letter-spacing: 0.04em;
  line-height: 0.92;
  color: var(--text);
  text-transform: uppercase;
}

.logo-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-sub::before {
  content: '';
  display: inline-block;
  width: 24px;
  height: 1px;
  background: var(--muted);
}

.today-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 400;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 1.5rem;
  display: block;
}

.legend {
  display: flex;
  gap: 18px;
  margin-top: 8px;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 400;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}
.leg-dot { width: 10px; height: 10px; border-radius: 1px; }
.leg-dot.ok   { background: var(--ok-bg); }
.leg-dot.fail { background: var(--fail-bg); }
.leg-dot.none { background: transparent; border: 1px solid var(--border2); }

/* ── RULE ── */
.rule {
  width: 100%;
  height: 1px;
  background: var(--text);
  margin: 2rem 0;
}

/* ── ADD SECTION ── */
.add-section {
  display: flex;
  gap: 0;
  margin-bottom: 2.5rem;
  border: 1px solid var(--text);
  animation: fadeUp 0.5s 0.06s ease both;
}

.add-input {
  flex: 1;
  min-width: 0;
  background: transparent;
  border: none;
  padding: 0 12px;
  height: 48px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  font-weight: 300;
  outline: none;
}
.add-input::placeholder {
  color: var(--muted);
  font-size: 16px;
}

.add-btn {
  height: 48px;
  padding: 0 20px;
  background: var(--text);
  border: none;
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.add-btn:hover { background: #333; }

/* ── CARDS ── */
.habits-list { display: flex; flex-direction: column; gap: 0; }

.habit-card {
  border-top: 1px solid var(--border);
  padding: 1.4rem 0;
  animation: fadeUp 0.4s ease both;
  position: relative;
}
.habit-card:last-child { border-bottom: 1px solid var(--border); }

.card-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 400;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 10px;
  text-transform: uppercase;
}

.card-main {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

/* Action buttons — horizontal */
.action-btns {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  margin-top: 2px;
}

.act-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--border2);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.05em;
  color: var(--muted);
  transition: all 0.15s;
  flex-shrink: 0;
  border-radius: 0;
}

.act-btn.ok-btn:hover  { border-color: var(--ok-bg); color: var(--ok-bg); background: var(--ok-light); }
.act-btn.ok-btn.active { border-color: var(--ok-bg); background: var(--ok-bg); color: #fff; }

.act-btn.fail-btn:hover  { border-color: var(--fail-bg); color: var(--fail-bg); background: var(--fail-light); }
.act-btn.fail-btn.active { border-color: var(--fail-bg); background: var(--fail-bg); color: #fff; }

.habit-info { flex: 1; min-width: 0; }

.habit-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 1.5rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1;
  margin-bottom: 10px;
}

/* Stats */
.stats-row {
  display: flex;
  gap: 20px;
  align-items: baseline;
}

.stat-block { line-height: 1; }

.stat-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 2rem;
  color: var(--ok-bg);
  line-height: 1;
  letter-spacing: -0.01em;
}
.stat-num.grey { color: var(--fail-bg); }

.stat-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 400;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 3px;
}

.stat-sep {
  width: 1px; height: 28px;
  background: var(--border);
  align-self: center;
}

.streak-emoji { font-size: 1rem; margin-left: 2px; }

/* Right side — rate + delete */
.card-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}

.rate-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
}

.delete-btn {
  background: none;
  border: 1px solid var(--border);
  padding: 4px 8px;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  transition: all 0.15s;
  border-radius: 0;
}
.delete-btn:hover { border-color: var(--text); color: var(--text); }

/* ── CALENDAR ── */
.cal-wrap { margin-top: 12px; }

.cal-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 400;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}
.cal-rate {
  font-weight: 700;
  color: var(--ok-bg);
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(28, 1fr);
  gap: 3px;
}

.dot {
  aspect-ratio: 1;
  border-radius: 0;
  background: var(--surface2);
  transition: transform 0.1s;
}
.dot:hover { transform: scale(1.5); z-index: 5; }
.dot.ok        { background: var(--ok-bg); opacity: 0.75; }
.dot.ok-today  { background: var(--ok-bg); opacity: 1; }
.dot.fail      { background: var(--fail-bg); opacity: 0.6; }
.dot.fail-today{ background: var(--fail-bg); opacity: 1; }
.dot.t-empty   { background: transparent; outline: 1px solid var(--text); outline-offset: 1px; }

/* ── EMPTY ── */
.empty-state {
  padding: 4rem 0;
  color: var(--muted);
}
.empty-big {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 5rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--surface2);
  display: block;
  line-height: 1;
  margin-bottom: 0.5rem;
}
.empty-text {
  font-size: 12px;
  letter-spacing: 0.05em;
  line-height: 1.8;
}

/* ── ANIM ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pop {
  0%  { transform: scale(1); }
  40% { transform: scale(1.2); }
  100%{ transform: scale(1); }
}
.pop { animation: pop 0.2s ease; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(255,255,255,0.85);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--text);
  padding: 2rem 1.5rem;
  max-width: 300px; width: 90%;
  text-align: center;
}
.modal p { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.8; }
.modal strong { color: var(--text); font-weight: 700; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button {
  flex: 1; height: 40px;
  border: 1px solid var(--border2);
  background: transparent; color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600; font-size: 11px;
  letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
}
.modal-btns .confirm-del { border-color: var(--text); color: var(--text); }
.modal-btns .confirm-del:hover { background: var(--text); color: #fff; }
.modal-btns button:hover { background: var(--surface2); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">KICK THE<br>HABIT</div>

    <span class="today-date" id="todayDate"></span>
    <div class="legend">
      <div class="legend-item"><div class="leg-dot ok"></div>断てた</div>
      <div class="legend-item"><div class="leg-dot fail"></div>できなかった</div>
      <div class="legend-item"><div class="leg-dot none"></div>未記録</div>
    </div>
  </header>

  <div class="rule"></div>

  <div class="add-section">
    <input class="add-input" id="newInput" type="text" placeholder="断ちたい習慣を入力（例：タバコ、深夜のスマホ）" maxlength="30">
    <button class="add-btn" onclick="addHabit()">Add +</button>
  </div>

  <div class="habits-list" id="habitList"></div>
</div>

<script>
const KEY='breakit_v3';
function getToday(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function pad(n){return String(n).padStart(2,'0');}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{habits:[]};}catch(e){return{habits:[]};}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d));}
function getLast28(){const days=[],t=new Date();for(let i=27;i>=0;i--){const d=new Date(t);d.setDate(t.getDate()-i);days.push(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);}return days;}
function calcStreak(okSet){let s=0,d=new Date(getToday()+'T00:00:00');while(true){const k=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;if(okSet.has(k)){s++;d.setDate(d.getDate()-1);}else break;}return s;}
function icon(n){return n>=30?'👑':n>=14?'🔥':n>=7?'⚡':n>=3?'✨':'';}

function render(){
  const data=load(),today=getToday(),days=getLast28();
  const d=new Date(),DOW=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('todayDate').textContent=
    `${d.getFullYear()} . ${pad(d.getMonth()+1)} . ${pad(d.getDate())}  /  ${DOW[d.getDay()]}`;

  const list=document.getElementById('habitList');
  if(!data.habits.length){
    list.innerHTML=`<div class="empty-state"><span class="empty-big">No<br>Habits</span><div class="empty-text">まだ習慣が登録されていません。<br>上の入力欄から追加しましょう。</div></div>`;
    return;
  }

  list.innerHTML=data.habits.map((h,idx)=>{
    const okSet=new Set(h.doneDays||[]),failSet=new Set(h.failDays||[]);
    const todayOk=okSet.has(today),todayFail=failSet.has(today);
    const streak=calcStreak(okSet);
    const okCount=days.filter(d=>okSet.has(d)).length;
    const failCount=days.filter(d=>failSet.has(d)).length;
    const rate=Math.round(okCount/28*100);

    const dots=days.map(day=>{
      const isOk=okSet.has(day),isFail=failSet.has(day),isToday=day===today;
      let dc='dot';
      if(isOk&&isToday)dc+=' ok-today';
      else if(isOk)dc+=' ok';
      else if(isFail&&isToday)dc+=' fail-today';
      else if(isFail)dc+=' fail';
      else if(isToday)dc+=' t-empty';
      const lbl=day.slice(5).replace('-','/');
      const st=isOk?'✓断てた':isFail?'✕できなかった':'';
      return `<div class="${dc}" title="${lbl} ${st}"></div>`;
    }).join('');

    return `<div class="habit-card" id="card-${idx}" style="animation-delay:${idx*0.05}s">
      <div class="card-num">— ${String(idx+1).padStart(2,'0')}</div>
      <div class="card-main">
        <div class="action-btns">
          <button class="act-btn ok-btn ${todayOk?'active':''}" onclick="toggleOk(${idx})" title="今日は断てた！">OK</button>
          <button class="act-btn fail-btn ${todayFail?'active':''}" onclick="toggleFail(${idx})" title="今日はできなかった…">NG</button>
        </div>
        <div class="habit-info">
          <div class="habit-name">${escHtml(h.name)}</div>
          <div class="stats-row">
            <div class="stat-block">
              <div class="stat-num">${streak}${streak>0?`<span class="streak-emoji">${icon(streak)}</span>`:''}</div>
              <div class="stat-label">連続達成</div>
            </div>
            <div class="stat-sep"></div>
            <div class="stat-block">
              <div class="stat-num">${okCount}</div>
              <div class="stat-label">28日・成功</div>
            </div>
            <div class="stat-block">
              <div class="stat-num grey">${failCount}</div>
              <div class="stat-label">28日・失敗</div>
            </div>
          </div>
        </div>
        <div class="card-right">
          <div class="rate-badge">${rate}%</div>
          <button class="delete-btn" onclick="confirmDelete(${idx})">Del</button>
        </div>
      </div>
      <div class="cal-wrap">
        <div class="cal-label"><span>Past 28 Days</span><span class="cal-rate">${okCount} / 28</span></div>
        <div class="cal-grid">${dots}</div>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toggleOk(idx){const data=load(),today=getToday(),h=data.habits[idx];const ok=new Set(h.doneDays||[]),fl=new Set(h.failDays||[]);if(ok.has(today)){ok.delete(today);}else{ok.add(today);fl.delete(today);}h.doneDays=[...ok];h.failDays=[...fl];save(data);render();animPop(`#card-${idx} .ok-btn`);}
function toggleFail(idx){const data=load(),today=getToday(),h=data.habits[idx];const ok=new Set(h.doneDays||[]),fl=new Set(h.failDays||[]);if(fl.has(today)){fl.delete(today);}else{fl.add(today);ok.delete(today);}h.doneDays=[...ok];h.failDays=[...fl];save(data);render();animPop(`#card-${idx} .fail-btn`);}
function animPop(sel){const el=document.querySelector(sel);if(!el)return;el.classList.add('pop');el.addEventListener('animationend',()=>el.classList.remove('pop'),{once:true});}
function addHabit(){const input=document.getElementById('newInput'),name=input.value.trim();if(!name){input.focus();return;}const data=load();data.habits.push({name,doneDays:[],failDays:[]});save(data);input.value='';render();}
function confirmDelete(idx){const data=load(),name=data.habits[idx].name;const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.innerHTML=`<div class="modal"><p><strong>「${escHtml(name)}」</strong>を削除しますか？<br>記録はすべて消えます。</p><div class="modal-btns"><button onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="confirm-del" onclick="deleteHabit(${idx});this.closest('.modal-overlay').remove()">Delete</button></div></div>`;document.body.appendChild(overlay);}
function deleteHabit(idx){const data=load();data.habits.splice(idx,1);save(data);render();}
document.getElementById('newInput').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});
render();
</script>
</body>
</html>
